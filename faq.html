<div class="faq-item">
<button class="faq-q">龜鹿膏怎麼吃？</button>
<div class="faq-a">
龜鹿膏可直接食用，也可以加入溫水沖泡。
</div>
</div>


<div class="faq-item">
<button class="faq-q">龜鹿飲怎麼喝？</button>
<div class="faq-a">
龜鹿飲開瓶即可飲用，也可以稍微溫熱後飲用。
</div>
</div>


<div class="faq-item">
<button class="faq-q">龜鹿湯塊怎麼煮？</button>
<div class="faq-a">
龜鹿湯塊可搭配雞肉或排骨燉煮成日常湯品。
</div>
</div>


<div class="faq-item">
<button class="faq-q">鹿茸粉怎麼搭配？</button>
<div class="faq-a">
鹿茸粉可加入茶、咖啡或牛奶作為日常飲品搭配。
</div>
</div>


<div class="faq-item">
<button class="faq-q">龜鹿產品每天可以吃嗎？</button>
<div class="faq-a">
可依個人飲食習慣適量食用，如有疑問建議詢問專業人士。
</div>
</div>


<div class="faq-item">
<button class="faq-q">龜鹿適合什麼族群？</button>
<div class="faq-a">
龜鹿常見於日常飲食與燉湯料理中，可依個人需求選擇不同型態。
</div>
</div>
