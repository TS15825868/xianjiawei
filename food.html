<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>飲食專區｜仙加味・龜鹿</title>
  <meta name="description" content="補養建議（綜合版）、季節推薦、龜鹿湯塊燉煮建議與常見問題（FAQ）。" />
  <meta name="theme-color" content="#0B1F3B" />

  <!-- 共用全站樣式（含漢堡選單） -->
  <link rel="stylesheet" href="theme_herbalrosegold.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    :root{
      --bg:#0b0f14;
      --card:#121924;
      --text:#e9eef5;
      --muted:#a8b3c2;
      --line:#243247;
      --accent:#2dd36f;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --radius: 16px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #142036 0%, var(--bg) 55%);
      color:var(--text);
      line-height:1.55;
    }
    a{color:inherit;}
    .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 64px;}
    /* 原本 food.html 自己的 topbar/nav 樣式已停用（改用全站共用 site-header 漢堡選單） */
    .hero{padding:18px 0 10px;}
    .hero h1{margin:10px 0 6px;font-size:26px;}
    .hero p{margin:0;color:var(--muted);}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:16px;}
    .card{
      grid-column: span 12;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card header{
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .card header h2{margin:0;font-size:18px;}
    .card header small{color:var(--muted);}
    .card .content{padding:14px 16px;}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;}
    .tabbtn{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;border-radius:999px;
      user-select:none;
    }
    .tabbtn[aria-selected="true"]{
      border-color: rgba(45,211,111,.45);
      background: rgba(45,211,111,.10);
    }
    .panel{margin-top:12px;}
    .panel h3{margin:0 0 8px;font-size:16px;}
    .muted{color:var(--muted);}
    .list{margin:0;padding-left:18px;}
    .list li{margin:6px 0;}
    .pill{
      display:inline-block;padding:6px 10px;border-radius:999px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      color:var(--muted);font-size:13px;margin-right:6px;margin-top:6px;
    }
    .faq{border-top:1px solid rgba(255,255,255,.08);}
    details{border-bottom:1px solid rgba(255,255,255,.08);padding:12px 0;}
    summary{cursor:pointer;font-weight:700;}
    .footnote{
      margin-top:10px;color:var(--muted);font-size:13px;
      border-top:1px dashed rgba(255,255,255,.15);padding-top:10px;
    }
    .two{grid-column:span 12;}
    @media (min-width: 900px){
      .two{grid-column:span 6;}
      .hero h1{font-size:30px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header" id="top">
      <div class="brand">
        <img class="logo" src="assets/logo.png" alt="台興山產 仙加味" />
        <div class="brand-text">
          <div class="since">SINCE 1978</div>
          <div class="title">仙加味・龜鹿</div>
        </div>
      </div>

      <button class="nav-toggle" aria-label="打開選單" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav" aria-label="主選單">
        <a href="index.html">首頁</a>
        <a href="products.html">產品總覽</a>
        <a href="selector.html">依需求挑選</a>
        <a href="food.html" class="active">飲食專區</a>
        <a href="tcm.html">中醫觀點</a>
        <a href="about.html">關於我們</a>
        <a href="faq.html">常見問題</a>
        <a href="contact.html">聯絡我們</a>
      </nav>
    </header>

    <div class="hero">
      <h1>飲食專區</h1>
      <p>補養建議（綜合版）・季節推薦・龜鹿湯塊燉煮搭配・常見問題</p>
    </div>

    <div class="grid">
      <section class="card two" id="card-nourish">
        <header>
          <h2>補養建議（綜合版）</h2>
          <small class="muted">依生活節奏選擇</small>
        </header>
        <div class="content">
          <div class="tabs" id="nourish-tabs"></div>
          <div class="panel" id="nourish-panel"></div>
          <div class="footnote" id="nourish-note"></div>
        </div>
      </section>

      <section class="card two" id="card-season">
        <header>
          <h2>季節推薦</h2>
          <small class="muted">四季飲食搭配參考</small>
        </header>
        <div class="content">
          <div class="tabs" id="season-tabs"></div>
          <div class="panel" id="season-panel"></div>
          <div class="footnote" id="season-note"></div>
        </div>
      </section>

      <section class="card" id="card-cook">
        <header>
          <h2>龜鹿湯塊（膠）燉煮建議</h2>
          <small class="muted">更多搭配與做法</small>
        </header>
        <div class="content">
          <div id="cook-panel"></div>
          <div class="footnote" id="cook-note"></div>
        </div>
      </section>

      <section class="card" id="card-faq">
        <header>
          <h2>常見問題（FAQ）</h2>
          <small class="muted">快速解答</small>
        </header>
        <div class="content faq" id="faq-panel"></div>
        <div class="content">
          <div class="footnote" id="faq-note"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const PRODUCTS_JSON_URL = "./products.json";

    function el(html){
      const t = document.createElement("template");
      t.innerHTML = html.trim();
      return t.content.firstChild;
    }

    function setTabs(tabsEl, panelEl, items, renderFn){
      tabsEl.innerHTML = "";
      if(!items || !items.length){
        panelEl.innerHTML = "<p class='muted'>目前尚未設定內容。</p>";
        return;
      }
      items.forEach((it, idx) => {
        const btn = el(`<button class="tabbtn" type="button" aria-selected="${idx===0}">${it.title}</button>`);
        btn.addEventListener("click", () => {
          [...tabsEl.querySelectorAll(".tabbtn")].forEach(b => b.setAttribute("aria-selected","false"));
          btn.setAttribute("aria-selected","true");
          panelEl.innerHTML = renderFn(it);
        });
        tabsEl.appendChild(btn);
      });
      panelEl.innerHTML = renderFn(items[0]);
    }

    function renderBlock(it){
      const bullets = (it.bullets || []).map(x => `<li>${x}</li>`).join("");
      const tips = (it.tips || []).map(x => `<span class="pill">${x}</span>`).join("");
      return `
        <h3>${it.title}</h3>
        ${it.subtitle ? `<p class="muted" style="margin:0 0 10px">${it.subtitle}</p>` : ""}
        ${bullets ? `<ul class="list">${bullets}</ul>` : "<p class='muted'>—</p>"}
        ${tips ? `<div style="margin-top:10px">${tips}</div>` : ""}
      `;
    }

    function renderSeason(it){
      const recos = (it.recos || []).map(r => `<li><b>${r.product}</b>：${r.text}</li>`).join("");
      const tips = (it.tips || []).map(x => `<span class="pill">${x}</span>`).join("");
      return `
        <h3>${it.title}</h3>
        ${it.subtitle ? `<p class="muted" style="margin:0 0 10px">${it.subtitle}</p>` : ""}
        ${recos ? `<ul class="list">${recos}</ul>` : "<p class='muted'>—</p>"}
        ${tips ? `<div style="margin-top:10px">${tips}</div>` : ""}
      `;
    }

    function renderCook(data){
      const g = data.guides?.cooking || {};
      const general = (g.general || []).map(x => `<li>${x}</li>`).join("");
      const ideas = (g.ideas || []).map(x => `<li>${x}</li>`).join("");

      return `
        <h3>基本原則</h3>
        ${general ? `<ul class="list">${general}</ul>` : "<p class='muted'>—</p>"}
        <h3 style="margin-top:14px">更多搭配</h3>
        ${ideas ? `<ul class="list">${ideas}</ul>` : "<p class='muted'>—</p>"}
      `;
    }

    function renderFAQ(data){
      const faqs = data.guides?.faq || [];
      if(!faqs.length) return `<p class="muted">目前尚未設定 FAQ。</p>`;
      return faqs.map(q => `
        <details>
          <summary>${q.q}</summary>
          <div class="muted" style="margin-top:8px;white-space:pre-wrap;">${q.a}</div>
        </details>
      `).join("");
    }

    async function init(){
      const res = await fetch(PRODUCTS_JSON_URL, { cache: "no-store" });
      const data = await res.json();

      setTabs(
        document.getElementById("nourish-tabs"),
        document.getElementById("nourish-panel"),
        data.guides?.nourish || [],
        renderBlock
      );
      document.getElementById("nourish-note").textContent =
        data.guides?.disclaimer || "※ 本頁為一般飲食與料理參考，實際以包裝標示與個人狀況為準。";

      setTabs(
        document.getElementById("season-tabs"),
        document.getElementById("season-panel"),
        data.guides?.season || [],
        renderSeason
      );
      document.getElementById("season-note").textContent =
        data.guides?.disclaimer || "※ 本頁為一般飲食與料理參考，實際以包裝標示與個人狀況為準。";

      document.getElementById("cook-panel").innerHTML = renderCook(data);
      document.getElementById("cook-note").textContent =
        data.guides?.disclaimer || "※ 本頁為一般飲食與料理參考，實際以包裝標示與個人狀況為準。";

      document.getElementById("faq-panel").innerHTML = renderFAQ(data);
      document.getElementById("faq-note").textContent =
        data.guides?.disclaimer || "※ 本頁為一般飲食與料理參考，實際以包裝標示與個人狀況為準。";
    }

    init().catch(err => {
      console.error(err);
      document.body.innerHTML =
        "<div style='padding:24px;color:#fff;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif'>讀取 products.json 失敗，請確認檔案已放到官網根目錄（/TaiShing/products.json）。</div>";
    });
  </script>

  <!-- 全站共用互動（漢堡選單等） -->
  <script src="main.js"></script>
</body>
</html>
