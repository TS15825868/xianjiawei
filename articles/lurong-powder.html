<h1>鹿茸粉怎麼吃</h1>

<p>

鹿茸粉是一種常見的日常飲品搭配食材，
可以加入咖啡、牛奶或茶飲。

</p>


<h2>鹿茸咖啡</h2>

<p>

將少量鹿茸粉加入熱咖啡，
攪拌均勻即可。

</p>


<h2>鹿茸牛奶</h2>

<p>

將鹿茸粉加入溫牛奶，
適合溫熱飲品。

</p>


<h2>鹿茸茶</h2>

<p>

可加入紅茶或花草茶。

</p>
