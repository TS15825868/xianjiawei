<h1>龜鹿雞湯怎麼煮</h1>

<h2>簡單介紹</h2>
<p>龜鹿雞湯怎麼煮是一種常見的龜鹿料理或食用方式。</p>

<h2>材料</h2>
<p>龜鹿湯塊、雞腿、枸杞、紅棗</p>

<h2>做法</h2>
<p>將雞腿與龜鹿湯塊、枸杞紅棗加入水中，小火燉煮約40–60分鐘即可。</p>
