<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>龜鹿產品推薦｜仙加味</title>

<link rel="stylesheet" href="site.css">

</head>

<body>

<header class="header">

<a href="index.html" class="logo">

<img src="images/logo-seal.png">
<span>仙加味</span>

</a>

</header>

<section class="section">

<h1>龜鹿產品推薦</h1>

<p class="center">

依生活方式推薦產品

</p>

</section>

<section class="section">

<div class="product-grid">

<button class="product-card choose-btn" data-product="guilu-gao">

日常補養

</button>

<button class="product-card choose-btn" data-product="guilu-drink">

快速飲用

</button>

<button class="product-card choose-btn" data-product="guilu-block">

燉湯料理

</button>

<button class="product-card choose-btn" data-product="lurong-powder">

飲品搭配

</button>

</div>

</section>

<script>

const map={
"guilu-gao":"product.html?id=guilu-gao",
"guilu-drink":"product.html?id=guilu-drink",
"guilu-block":"product.html?id=guilu-block",
"lurong-powder":"product.html?id=lurong-powder"
};

document.querySelectorAll(".choose-btn").forEach(btn=>{
btn.onclick=function(){
location.href=map[this.dataset.product];
};
});

</script>

</body>
</html>
