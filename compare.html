<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品比較｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<header class="header">
<a href="index.html" class="logo"><img src="images/logo-small.png"></a>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div id="menu" class="menu-overlay"></div>

<section class="section">

<h1>產品比較</h1>
<p>快速看懂差異，直接選擇</p>

<div id="compare-table"></div>

</section>

<a href="https://lin.ee/sHZW7NkR?text=幫我推薦適合我的龜鹿"
class="floating-line">LINE</a>

<script src="site.js"></script>

<script>
fetch("products.json")
.then(res=>res.json())
.then(data=>{

const el = document.getElementById("compare-table");

el.innerHTML = `
<table style="width:100%;border-collapse:collapse">

<tr>
<th>產品</th>
${data.map(p=>`<th>${p.name}</th>`).join("")}
</tr>

<tr>
<td>使用方式</td>
${data.map(p=>`<td>${p.usage[0]}</td>`).join("")}
</tr>

<tr>
<td>適合</td>
${data.map(p=>`<td>${p.target[0]}</td>`).join("")}
</tr>

<tr>
<td>建議</td>
${data.map(p=>`<td>
<a href="https://lin.ee/sHZW7NkR?text=${encodeURIComponent(p.lineText)}"
class="btn btn-line">詢問</a>
</td>`).join("")}
</tr>

</table>
`;
});
</script>

</body>
</html>
