<!-- STEP 1 -->
<div class="card">
<h3>你的使用習慣</h3>

<button class="btn" onclick="selectType('方便')">想方便</button>
<button class="btn" onclick="selectType('料理')">想料理</button>
<button class="btn" onclick="selectType('自由搭配')">想自己搭配</button>
<button class="btn" onclick="selectType('固定食用')">固定習慣</button>

</div>

<!-- 結果 -->
<div id="result" style="margin-top:30px;"></div>

</section>

<script src="site.js"></script>
<script>

// ===== 推薦邏輯 =====
function selectType(type){

let result = {};

if(type==="方便"){
result = {
name:"龜鹿飲",
text:"我想了解龜鹿飲"
};
}

if(type==="料理"){
result = {
name:"龜鹿湯塊",
text:"我想了解龜鹿湯塊"
};
}

if(type==="自由搭配"){
result = {
name:"鹿茸粉",
text:"我想了解鹿茸粉"
};
}

if(type==="固定食用"){
result = {
name:"龜鹿膏",
text:"我想了解龜鹿膏"
};
}

document.getElementById("result").innerHTML = `
<div class="card">

<h2>推薦你：${result.name}</h2>

<p>這個型態比較符合你的使用方式</p>

<a href="products.html" class="btn">
查看產品
</a>

<a href="https://lin.ee/sHZW7NkR?text=${encodeURIComponent(result.text)}"
class="btn btn-line">
LINE直接詢問
</a>

</div>
`;

}

</script>
