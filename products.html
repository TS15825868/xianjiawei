  </div>
</footer>

<script src="site.js"></script>

<script>
const params = new URLSearchParams(location.search);
const id = params.get("id");
const from = params.get("from");

const backBtn = document.getElementById("backBtn");
const productWrap = document.getElementById("product");

if (backBtn) {
  if (from && from.trim() !== "") {
    backBtn.href = from;
  } else if (document.referrer && document.referrer.includes(window.location.host)) {
    try {
      const refUrl = new URL(document.referrer);
      const refPath = refUrl.pathname.split("/").pop();
      backBtn.href = refPath || "guilu-series.html";
    } catch (e) {
      backBtn.href = "guilu-series.html";
    }
  } else {
    backBtn.href = "guilu-series.html";
  }
}

fetch("products.json")
.then(r => r.json())
.then(data => {
  const p = data.products.find(x => x.id === id) || data.products[0];

  const sizes = Array.isArray(p.sizes) ? p.sizes.join(" / ") : (p.size || "—");
  const ingredients = Array.isArray(p.ingredients)
    ? p.ingredients.map(item => `<li>${item}</li>`).join("")
    : String(p.ingredients || "").split(/\s+/).filter(Boolean).map(item => `<li>${item}</li>`).join("");
  const uses = Array.isArray(p.uses) && p.uses.length
    ? p.uses.map(item => `<li>${item}</li>`).join("")
    : "<li>請透過 LINE 詢問食用方式。</li>";

  const packageText = p.package || "—";

  document.title = `${p.name}｜仙加味`;

  productWrap.innerHTML = `
    <div class="product-image">
      <img src="${p.image}" alt="${p.name}" onerror="this.onerror=null;this.src='images/logo-seal.png';this.classList.add('img-placeholder');">
    </div>

    <div class="product-info">

      <div class="product-card">
        <div class="eyebrow">產品介紹</div>
        <h1>${p.name}</h1>
        <p>${p.desc || ""}</p>

        <div style="margin-top:18px;">
          <a href="https://lin.ee/sHZW7NkR" class="btn" target="_blank" rel="noopener">LINE詢問</a>
        </div>
      </div>

      <div class="product-card" style="margin-top:20px;">
        <h3>規格</h3>
        <p><strong>容量：</strong>${sizes}</p>
        <p><strong>包裝：</strong>${packageText}</p>
      </div>

      <div class="product-card" style="margin-top:20px;">
        <h3>成份</h3>
        <ul>${ingredients}</ul>
      </div>

      <div class="product-card" style="margin-top:20px;">
        <h3>食用方式</h3>
        <ul>${uses}</ul>
      </div>

    </div>
  `;
})
.catch(err => {
  console.error(err);
  productWrap.innerHTML = `
    <div class="product-card">
      <h1>找不到產品資料</h1>
      <p>請返回龜鹿系列重新查看。</p>
      <a href="guilu-series.html" class="btn">返回龜鹿系列</a>
    </div>
  `;
});
</script>

</body>
</html>
