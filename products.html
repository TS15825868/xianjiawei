<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品｜仙加味</title>
<meta name="description" content="龜鹿膏、龜鹿飲、龜鹿湯塊與鹿茸粉，依不同生活型態選擇補養方式。">
<link rel="stylesheet" href="/xianjiawei/site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>產品選擇</h1>
<p>依照生活型態，找到適合的方式。</p>
</section>

<!-- 龜鹿膏 -->
<section class="card product">
<img src="/xianjiawei/images/guilu-gao-100g.jpg">
<h2>龜鹿膏</h2>
<p>建立日常補養節奏</p>

<button class="btn btn-primary"
onclick='openModal({
name:"龜鹿膏",
image:"/xianjiawei/images/guilu-gao-100g.jpg",
desc:"適合日常穩定補養",
spec:"100g / 罐",
ingredient:"龜板萃取物、鹿角萃取物、粉光蔘、枸杞、紅棗、黃耆",
usage:["每日1–2次","每次1小匙","可搭配溫水"]
})'>
查看詳細
</button>
</section>

<!-- 龜鹿飲 -->
<section class="card product">
<img src="/xianjiawei/images/guilu-drink-30cc.jpg">
<h2>龜鹿飲</h2>
<p>快速補養方式</p>

<button class="btn btn-primary"
onclick='openModal({
name:"龜鹿飲",
image:"/xianjiawei/images/guilu-drink-30cc.jpg",
desc:"忙碌生活也能補養",
spec:"30cc / 罐",
ingredient:"水、龜板萃取物、鹿角萃取物",
usage:["每日1–2次","每次1罐","建議溫熱飲用"]
})'>
查看詳細
</button>
</section>

<!-- 湯塊 -->
<section class="card product">
<img src="/xianjiawei/images/guilu-block-75g.jpg">
<h2>龜鹿湯塊</h2>
<p>料理型補養</p>

<button class="btn btn-primary"
onclick='openModal({
name:"龜鹿湯塊",
image:"/xianjiawei/images/guilu-block-75g.jpg",
desc:"適合燉湯使用",
spec:"75g / 盒",
ingredient:"龜板萃取物、鹿角萃取物",
usage:["每日1–2次","每次1塊","燉湯使用"]
})'>
查看詳細
</button>
</section>

</main>

<div id="modal" class="modal"></div>
<div id="app-footer"></div>

<script src="/xianjiawei/site.js"></script>

</body>
</html>
