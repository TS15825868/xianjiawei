<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幫你配｜仙加味</title>
<link rel="stylesheet" href="/xianjiawei/site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>不用想，我幫你配</h1>
</section>

<form class="card" onsubmit="go(event)">
<select id="life">
<option value="busy">忙碌</option>
<option value="normal">一般</option>
</select>

<select id="type">
<option value="easy">方便</option>
<option value="cook">料理</option>
</select>

<button class="btn btn-primary">開始</button>
</form>

</main>

<div id="app-footer"></div>
<script src="/xianjiawei/site.js"></script>

<script>
function go(e){
 e.preventDefault();
 const life=document.getElementById("life").value;
 let result="gao";
 if(life==="busy") result="drink";
 window.location="combo.html?set="+result;
}
</script>

</body>
</html>
