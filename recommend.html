<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幫你選｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>幫你找到適合的方式</h1>
<p>不用研究，我們直接幫你配好。</p>
</section>

<form class="card" onsubmit="handleRecommend(event)">

<label>1️⃣ 你的生活型態</label>
<select id="life">
<option value="busy">忙碌</option>
<option value="normal">一般</option>
</select>

<label>2️⃣ 你想要的方式</label>
<select id="type">
<option value="easy">方便</option>
<option value="cook">料理</option>
</select>

<label>3️⃣ 是否想進階補養</label>
<select id="level">
<option value="no">不用</option>
<option value="yes">想要</option>
</select>

<button type="submit" class="btn btn-primary">幫我配</button>

</form>

</main>

<div id="app-footer"></div>

<script src="site.js"></script>

<script>
function handleRecommend(e){
  e.preventDefault();

  const life = document.getElementById("life").value;
  const type = document.getElementById("type").value;
  const level = document.getElementById("level").value;

  let result = "gao";

  if(type === "cook"){
    result = "block";
  }else if(level === "yes"){
    result = "lurong";
  }else if(life === "busy"){
    result = "drink";
  }

  window.location.href = "combo.html?set=" + result;
}
</script>

</body>
</html>
