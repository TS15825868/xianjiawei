<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>快速推薦｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>幫你找到適合的補養方式</h1>
<p>不用研究，3個問題直接幫你配好。</p>
</section>

<div id="step"></div>

</main>

<div id="app-footer"></div>

<script src="site.js"></script>

<script>

let answers = {};

// 題目流程
function renderStep1(){
  document.getElementById("step").innerHTML = `
    <section class="card">
      <h2>你的生活節奏？</h2>

      <button class="btn" onclick="step1('busy')">忙碌</button>
      <button class="btn" onclick="step1('normal')">一般</button>
      <button class="btn" onclick="step1('cook')">有時間料理</button>
    </section>
  `;
}

function step1(val){
  answers.life = val;
  renderStep2();
}

function renderStep2(){
  document.getElementById("step").innerHTML = `
    <section class="card">
      <h2>你希望怎麼使用？</h2>

      <button class="btn" onclick="step2('fast')">方便快速</button>
      <button class="btn" onclick="step2('daily')">日常穩定</button>
      <button class="btn" onclick="step2('food')">料理搭配</button>
    </section>
  `;
}

function step2(val){
  answers.use = val;
  renderStep3();
}

function renderStep3(){
  document.getElementById("step").innerHTML = `
    <section class="card">
      <h2>是否需要進階補養？</h2>

      <button class="btn" onclick="step3('yes')">需要</button>
      <button class="btn" onclick="step3('no')">不用</button>
    </section>
  `;
}

function step3(val){
  answers.extra = val;
  showResult();
}

function showResult(){

  let result = [];

  // 主推薦
  if(answers.life === 'busy' || answers.use === 'fast'){
    result.push("龜鹿飲");
  } else if(answers.use === 'daily'){
    result.push("龜鹿膏");
  } else if(answers.use === 'food'){
    result.push("龜鹿湯塊");
  }

  // 進階
  if(answers.extra === 'yes'){
    result.push("鹿茸粉");
  }

  let text = "推薦組合：" + result.join(" + ");

  document.getElementById("step").innerHTML = `
    <section class="card">
      <h2>推薦結果</h2>
      <p>${text}</p>

      <a class="btn btn-primary"
        href="https://line.me/R/ti/p/@762jybnm?text=${encodeURIComponent("我要這個搭配：" + text)}">
        👉 直接LINE下單
      </a>

      <br><br>

      <button class="btn" onclick="renderStep1()">重新選擇</button>
    </section>
  `;
}

// 初始化
renderStep1();

</script>

</body>
</html>
