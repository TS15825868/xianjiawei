<body>
<div id="header"></div>

<section style="padding:100px 20px">
  <h1>怎麼選</h1>

  <button onclick="pick('日常保養')">日常</button>
  <button onclick="pick('方便快速')">方便</button>
  <button onclick="pick('料理燉煮')">料理</button>

  <div id="result"></div>
</section>

<script src="/site.js"></script>
<script>
loadData().then(()=>{
  document.getElementById('header').innerHTML = renderHeader();
});

function pick(k){
  const r = DATA.recommend.find(x=>x.keyword===k);
  document.getElementById('result').innerHTML = r.result;
}
</script>
</body>
