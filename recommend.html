<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>怎麼選｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<div id="header"></div>

<section class="section">

<h1>從你的生活開始</h1>

<p>不用先懂產品，只需要知道你的使用方式。</p>

</section>

<section class="section">

<div class="card">
<h3>我想穩定調整</h3>
<p>適合建立長期節奏</p>
<button onclick="buy('日常型')">了解方式</button>
</div>

<div class="card">
<h3>我時間很少</h3>
<p>適合快速補充</p>
<button onclick="buy('快速型')">了解方式</button>
</div>

<div class="card">
<h3>我想用料理</h3>
<p>透過飲食慢慢融入</p>
<button onclick="buy('料理型')">了解方式</button>
</div>

</section>

<section class="section">

<h2>如果還是不確定</h2>
<p>直接詢問會更快找到方向。</p>

<button onclick="buy('推薦')" class="btn-primary">
LINE詢問
</button>

</section>

<script src="site.js"></script>
</body>
</html>
