<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商品頁</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app"></div>

<script>

const products = {

img:"images/guilu-gao.jpg",
desc:"濃縮膏體｜日常補養"
},
"guilu-drink":{

},
"guilu-block":{

const params = new URLSearchParams(location.search);
const id = params.get("id") || "guilu-gao";
const p = products[id];

document.getElementById("app").innerHTML = `
<img src="${p.img}" class="full">

<div class="box">

<a href="https://lin.ee/sHZW7NkR" class="btn big">
👉 免費幫你搭配
</a>

</div>

<div class="switch">

<a href="?id=guilu-gao">龜鹿膏</a>
<a href="?id=guilu-drink">龜鹿飲</a>
<a href="?id=guilu-block">龜鹿湯塊</a>

</div>

<div class="bottom">
<a href="https://lin.ee/sHZW7NkR" class="btn big">立即詢問</a>
</div>
`;

</script>

</body>
</html>
