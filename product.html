<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商品頁</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app"></div>

<script>

const products = {
"guilu-gao":{name:"龜鹿膏",desc:"日常補養"},
"guilu-drink":{name:"龜鹿飲",desc:"外出方便"},
"guilu-block":{name:"龜鹿湯塊",desc:"料理使用"},
"lurong":{name:"鹿茸粉",desc:"粉末型"}
};

const id = new URLSearchParams(location.search).get("id") || "guilu-gao";
const p = products[id];

document.getElementById("app").innerHTML = `
<h1>${p.name}</h1>
<p>${p.desc}</p>

<button onclick="goLine('daily')">平常保養</button>
<button onclick="goLine('tired')">最近比較累</button>

`;

function goLine(type){
let text = type==="daily" ? "我想日常搭配" : "我最近比較累想調整";
window.open("https://lin.ee/sHZW7NkR?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
