<!DOCTYPE html>
<html>
<head>

<title>觀點</title>

<body>

<div id="app-header"></div>

<main>

<div id="video-list" class="grid"></div>

<script src="site.js"></script>

<script>
const videos=[

"7597798718720576789","7590648704156142868","7571657095880232210",
"7561374523564543249","7490604047783726343","7486299595979394312",
"7488238569224555794","7488239418650807560","7475988696827727112",
"7473305364415384850","7446332181263289607","7445221794769898759",
"7444622264642833671","7444467481059560712","7444051217757752583",
"7443754721195691319","7442637133308759352","7441892944057027896",
"7441142424518315280","7440039107708914945","7410727121875782919"
];

const el=document.getElementById("video-list");

el.innerHTML=videos.map((id,i)=>`
<div class="card">
<div onclick="load(${i})" class="btn">播放影片</div>
<div id="v${i}"></div>

function load(i){

`<iframe src="https://www.tiktok.com/embed/${videos[i]}" width="100%" height="500"></iframe>`;
}
</script>

</body>
</html>
