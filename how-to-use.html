<section class="section">

<h1>怎麼使用龜鹿產品</h1>

<h2>龜鹿膏</h2>
<ul>
<li>可直接食用</li>
<li>可加入溫水攪拌</li>
<li>建議早上或下午使用</li>
</ul>

<h2>龜鹿飲</h2>
<ul>
<li>開封即可飲用</li>
<li>可溫熱後飲用</li>
</ul>

<h2>龜鹿湯塊</h2>
<ul>
<li>加入雞湯或排骨湯</li>
<li>一鍋約1～2塊</li>
</ul>

<h2>鹿茸粉</h2>
<ul>
<li>加入熱水</li>
<li>加入咖啡或茶</li>
</ul>

</section>
