
<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仙加味</title>
<meta name="description" content="仙加味龜鹿系列：龜鹿膏、龜鹿飲、龜鹿湯塊與鹿茸粉。">
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#fff;color:#111}
header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid #eee;background:#fff;position:sticky;top:0}
header .logo{font-weight:700;font-size:18px}
header button{font-size:20px;background:none;border:none;cursor:pointer}

.hero{
height:70vh;
background:url('images/hero-guilu-gao.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero h1{font-size:36px;margin:0}
.hero p{opacity:.9}

.section{max-width:1100px;margin:auto;padding:60px 20px}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:24px;
margin-top:30px;
}

.card{
background:#fff;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
padding:20px;
text-align:center;
transition:.3s;
}

.card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.15)}

.card img{width:100%;border-radius:12px}

.cta{
text-align:center;
padding:80px 20px;
background:#f7f7f7;
}

.cta a{
display:inline-block;
padding:14px 26px;
border-radius:10px;
background:#111;
color:#fff;
text-decoration:none;
}

footer{
text-align:center;
padding:40px 20px;
color:#666;
}
</style>
</head>
<body>

<header>
<div class="logo">仙加味</div>
<button>☰</button>
</header>

<section class="hero">
<div>
<h1>讓龜鹿回到日常飲食文化</h1>
<p>仙加味龜鹿系列</p>
</div>
</section>

<section class="section">
<h2 style="text-align:center">龜鹿系列</h2>

<div class="cards">

<div class="card">
<img src="images/guilu-gao-100g.jpg">
<h3>龜鹿膏</h3>
<p>膏狀型態</p>
</div>

<div class="card">
<img src="images/guilu-drink-30cc.jpg">
<h3>龜鹿飲</h3>
<p>即開即飲</p>
</div>

<div class="card">
<img src="images/guilu-block-75g.jpg">
<h3>龜鹿湯塊</h3>
<p>料理燉湯</p>
</div>

<div class="card">
<img src="images/lurong-powder-75g.jpg">
<h3>鹿茸粉</h3>
<p>飲品搭配</p>
</div>

</div>
</section>

<section class="section">
<h2 style="text-align:center">柒玄茶</h2>

<div class="cards">

<div class="card">
<img src="images/qixuan-guilu-mix.jpg">
<h3>柒玄茶・龜鹿調飲粉</h3>
<p>可加入茶與咖啡</p>
</div>

</div>

</section>

<section class="cta">
<h2>不確定怎麼選龜鹿？</h2>
<p><a href="https://lin.ee/sHZW7NkR">LINE詢問</a></p>
</section>

<footer>
<p>仙加味</p>
<p>龜鹿日常 · 讓龜鹿回到日常飲食文化</p>
</footer>

</body>
</html>
