<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>立即下單｜仙加味</title>
<meta name="description" content="仙加味龜鹿產品下單頁">
<link rel="stylesheet" href="site.css">
</head>

<body>

<header class="header">
<a href="index.html" class="logo">
<img src="images/logo-seal.png">
<span>仙加味</span>
</a>
</header>

<main>

<section class="section">

<h1 style="text-align:center">立即下單</h1>

<div class="info-card" style="max-width:500px;margin:auto">

<label>商品</label>
<select id="product">
<option>龜鹿膏</option>
<option>龜鹿飲</option>
<option>龜鹿湯塊</option>
<option>鹿茸粉</option>
</select>

<label>數量</label>
<input id="qty" type="number" value="1">

<label>姓名</label>
<input id="name">

<label>電話</label>
<input id="phone">

<label>配送方式</label>
<select id="delivery">
<option>7-11</option>
<option>宅配</option>
<option>面交</option>
</select>

<button class="btn btn-line" onclick="submitOrder()">
送出訂單
</button>

</div>

</section>

</main>

<script>
function submitOrder(){

const data = {
product:document.getElementById('product').value,
qty:document.getElementById('qty').value,
name:document.getElementById('name').value,
phone:document.getElementById('phone').value,
delivery:document.getElementById('delivery').value
};

// 👉 傳到你的CRM
fetch("https://你的GAS網址",{
method:"POST",
body:JSON.stringify({
action:"order",
...data
})
});

alert("✅ 訂單已送出");

}
</script>

</body>
</html>
