<h1>成分介紹</h1>

<p>
整理仙加味龜鹿系列中常見的食材方向，
方便了解不同產品型態背後的原料組合。
</p>

</div>

</section>


<div class="container">

<div class="grid">

<div class="card">
<h3>龜板萃取物</h3>
<p>
龜板為龜鹿系列中常見原料方向之一，
常見於膏、飲與湯塊產品。
</p>
</div>

<div class="card">
<h3>鹿角萃取物</h3>
<p>
鹿角為龜鹿產品的重要基礎食材，
常見於鹿茸膏、龜鹿飲與龜鹿湯塊。
</p>
</div>

<div class="card">
<h3>粉光蔘</h3>
<p>
粉光蔘常見於龜鹿膏與龜鹿飲原料中，
與龜板、鹿角一同整理成日常食用型態。
</p>
</div>

<div class="card">
<h3>枸杞</h3>
<p>
枸杞常見於燉食搭配與湯料理，
也常出現在龜鹿相關食材方向中。
</p>
</div>

<div class="card">
<h3>紅棗</h3>
<p>
紅棗常與雞湯或排骨湯搭配，
讓燉湯更容易被日常飲食使用。
</p>
</div>

<div class="card">
<h3>黃耆</h3>
<p>
黃耆常見於燉湯與日常食材搭配，
使湯品與飲食情境更完整。
</p>
</div>

</div>
