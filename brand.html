<main class="wrap section"><div class="grid-3"><section class="card simple-card"><div class="eyebrow">龜鹿文化</div><h3>從飲食理解傳統</h3><p>龜板與鹿角在傳統飲食文化中常見於藥膳與燉湯料理，逐漸形成龜鹿相關的食養文化。</p></section><section class="card simple-card"><div class="eyebrow">仙加味理念</div><h3>把龜鹿帶回日常</h3><p>仙加味將龜鹿整理為膏、飲、湯塊與粉四種型態，讓產品更容易融入日常飲食生活。</p></section><section class="card simple-card"><div class="eyebrow">柒玄茶系列</div><h3>延伸的養生飲品</h3><p>柒玄茶為仙加味的飲品系列，目前以龜鹿調飲粉為主，未來可延伸茶包、咖啡包與草本茶。</p></section></div></main><footer class="footer"><strong>仙加味</strong><div>龜鹿日常 · 讓龜鹿回到日常飲食文化</div><div style="margin-top:10px"><a href="https://lin.ee/sHZW7NkR" target="_blank" rel="noopener">LINE詢問</a></div></footer><a class="floating-line" href="https://lin.ee/sHZW7NkR" target="_blank" rel="noopener">LINE詢問</a><script src="site.js"></script></body></html>
