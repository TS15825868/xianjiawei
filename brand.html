<section class="hero"><div class="hero-grid"><div class="hero-copy"><span class="eyebrow">品牌故事</span><h1>從萬華起家，把龜鹿帶回日常</h1><p>品牌背景來自萬華鹿角家族與傳統行口經驗，從素材、工序到使用方式，都不是只靠文案堆起來。</p></div><div class="hero-visual reveal"><img src="images/hero.jpg" alt="品牌故事"></div></div></section>
<section class="section"><div class="compare-grid"><article class="panel reveal"><h3>萬華起點</h3><p>從素材理解、工序延續到飲食搭配，都是一路累積下來的判斷。</p></article><article class="panel reveal"><h3>日常觀點</h3><p>不把補養說成誇張效果，而是回到穩定、適量、固定節奏的日常理解。</p></article><article class="panel reveal"><h3>工序延續</h3><p>以龜板萃取物與鹿角萃取物為基礎，結合長時間熬製與濃縮，形成現在的龜鹿系列。</p></article><article class="panel reveal"><h3>官網角色</h3><p>這裡是品牌官網，不是電商賣場。重點是讓你知道怎麼選、怎麼搭配、怎麼理解品牌。</p></article></div></section>
